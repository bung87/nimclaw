name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Nim
      uses: alaviss/setup-nim@0.1.1
      with:
        path: 'nim'
        version: 'version-2-2'

    - name: Build
      run: nimble build -Y

    - name: Test
      run: nimble test -Y
